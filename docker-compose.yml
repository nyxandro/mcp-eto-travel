version: '3.8'

services:
  mcp-eto-travel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-eto-travel
    restart: unless-stopped
    environment:
      TRANSPORT_MODE: http
      HOST: 0.0.0.0
      PORT: 3000
      MCP_PATH: /mcp
      ALLOWED_HOSTS: mcp.example.com,localhost,127.0.0.1
    ports:
      - '3000:3000'
