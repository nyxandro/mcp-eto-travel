version: '3.8'

services:
  mcp-eto-travel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-eto-travel
    restart: unless-stopped
    environment:
      TRANSPORT_MODE: ${TRANSPORT_MODE:-http}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      MCP_PATH: ${MCP_PATH:-/mcp}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-mcp.example.com,localhost,127.0.0.1}
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
